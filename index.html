<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frø</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #f0fdf4;
        color: #374151;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* Thin green accent line at very top */
      body::before {
        content: '';
        display: block;
        height: 3px;
        background: linear-gradient(90deg, #14532d 0%, #16a34a 40%, #4ade80 100%);
      }

      .wrap {
        max-width: 440px;
        margin: 0 auto;
        padding: 40px 16px 64px;
      }

      /* ── Brand ─────────────────────────────── */
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 36px;
      }

      .app-icon {
        width: 76px;
        height: 76px;
        background: linear-gradient(150deg, #16a34a 0%, #14532d 100%);
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 14px;
        box-shadow:
          0 8px 28px rgba(22, 163, 74, 0.32),
          0 2px 6px rgba(22, 163, 74, 0.14);
      }

      .app-name {
        font-size: 36px;
        font-weight: 800;
        color: #14532d;
        letter-spacing: -0.04em;
        line-height: 1;
      }

      .app-tagline {
        font-size: 13px;
        color: #9ca3af;
        margin-top: 6px;
        letter-spacing: 0.01em;
      }

      /* ── Hero card ─────────────────────────── */
      .hero {
        background: white;
        border-radius: 20px;
        padding: 24px 24px 22px;
        margin-bottom: 12px;
        box-shadow:
          0 1px 2px rgba(0,0,0,0.06),
          0 6px 24px rgba(0,0,0,0.05);
        position: relative;
        overflow: hidden;
      }

      /* Decorative radial glow, top-right */
      .hero::after {
        content: '';
        position: absolute;
        top: -50px;
        right: -50px;
        width: 160px;
        height: 160px;
        background: radial-gradient(circle, #dcfce7 0%, transparent 70%);
        pointer-events: none;
      }

      .category-badge {
        display: inline-flex;
        align-items: center;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #166534;
        border-radius: 100px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 600;
        text-transform: capitalize;
        letter-spacing: 0.02em;
        margin-bottom: 14px;
      }

      .variety-name {
        font-size: 30px;
        font-weight: 800;
        color: #111827;
        line-height: 1.15;
        letter-spacing: -0.025em;
        margin-bottom: 7px;
        position: relative;
      }

      .common-name {
        font-size: 15px;
        color: #6b7280;
        line-height: 1.5;
      }

      /* ── Sharer ────────────────────────────── */
      .sharer {
        display: flex;
        align-items: center;
        gap: 14px;
        background: white;
        border-radius: 16px;
        padding: 16px 20px;
        margin-bottom: 20px;
        box-shadow:
          0 1px 2px rgba(0,0,0,0.05),
          0 2px 10px rgba(0,0,0,0.04);
      }

      .sharer-avatar {
        width: 46px;
        height: 46px;
        background: linear-gradient(135deg, #dcfce7, #bbf7d0);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 19px;
        font-weight: 700;
        color: #16a34a;
        border: 2px solid #f0fdf4;
      }

      .sharer-label {
        font-size: 11px;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 3px;
      }

      .sharer-name {
        font-size: 15px;
        font-weight: 600;
        color: #111827;
      }

      /* ── Notice ────────────────────────────── */
      .notice {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #dcfce7;
        border: 1px solid #86efac;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 13.5px;
        color: #166534;
        margin-bottom: 16px;
        line-height: 1.5;
        font-weight: 500;
      }

      /* ── Info cards ────────────────────────── */
      .card {
        background: white;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 12px;
        box-shadow:
          0 1px 2px rgba(0,0,0,0.05),
          0 2px 10px rgba(0,0,0,0.04);
      }

      .card-title {
        font-size: 11px;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 14px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        padding: 9px 0;
        border-bottom: 1px solid #f3f4f6;
        font-size: 14px;
      }

      .row:first-of-type { padding-top: 0; }
      .row:last-child { border-bottom: none; padding-bottom: 0; }
      .row .label { color: #6b7280; }
      .row .value { color: #111827; font-weight: 600; text-align: right; }

      .notes {
        font-size: 14px;
        color: #6b7280;
        line-height: 1.75;
        font-style: italic;
      }

      /* ── Actions ───────────────────────────── */
      .actions {
        margin-top: 24px;
      }

      .cta {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: #16a34a;
        color: white;
        text-decoration: none;
        padding: 19px 24px;
        border-radius: 16px;
        font-size: 17px;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -0.01em;
        box-shadow:
          0 4px 20px rgba(22, 163, 74, 0.32),
          0 1px 4px rgba(22, 163, 74, 0.2);
        transition: background 0.15s, box-shadow 0.15s;
      }

      .cta:hover {
        background: #15803d;
        box-shadow: 0 6px 28px rgba(22, 163, 74, 0.42);
      }

      .hint {
        text-align: center;
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 20px;
        line-height: 1.65;
      }

      .store-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .store-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: white;
        color: #374151;
        text-decoration: none;
        padding: 14px 12px;
        border-radius: 13px;
        font-size: 13.5px;
        font-weight: 600;
        border: 1.5px solid #e5e7eb;
        letter-spacing: -0.01em;
        transition: border-color 0.15s, color 0.15s;
      }

      .store-btn:hover {
        border-color: #16a34a;
        color: #16a34a;
      }

      .store-btn svg {
        flex-shrink: 0;
      }

      /* ── Footer ────────────────────────────── */
      .footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 36px;
        font-size: 12px;
        color: #9ca3af;
      }

      /* ── Loading ───────────────────────────── */
      .loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 16px;
        color: #9ca3af;
        font-size: 14px;
      }

      .spinner {
        width: 34px;
        height: 34px;
        border: 2.5px solid #bbf7d0;
        border-top-color: #16a34a;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* Fade-in for the rendered content */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .wrap { animation: fadeUp 0.35s ease both; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading seed info&hellip;</p>
      </div>
    </div>

    <script>
      var SUPABASE_URL = "https://yosipqxkmpdlsxsmhrdc.supabase.co";
      var SUPABASE_ANON_KEY = "sb_publishable_Zcn1Sl1Yq9-lWIF48tXzoQ_SlA8OccZ";

      var ICON_SPROUT_WHITE =
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M 12 21 C 12 18 11.5 16 12 13"/>' +
          '<path d="M 12 13 C 9 12 6 10 7 8 C 8 6 11 9 12 13"/>' +
          '<path d="M 12 13 C 15 12 18 10 17 8 C 16 6 13 9 12 13"/>' +
          '<path d="M 12 13 C 11.5 10 11.5 8 12 5 C 12.5 8 12.5 10 12 13"/>' +
        '</svg>';

      var ICON_SPROUT_GREEN =
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M 12 21 C 12 18 11.5 16 12 13"/>' +
          '<path d="M 12 13 C 9 12 6 10 7 8 C 8 6 11 9 12 13"/>' +
          '<path d="M 12 13 C 15 12 18 10 17 8 C 16 6 13 9 12 13"/>' +
          '<path d="M 12 13 C 11.5 10 11.5 8 12 5 C 12.5 8 12.5 10 12 13"/>' +
        '</svg>';

      var ICON_SPROUT_GRAY =
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M 12 21 C 12 18 11.5 16 12 13"/>' +
          '<path d="M 12 13 C 9 12 6 10 7 8 C 8 6 11 9 12 13"/>' +
          '<path d="M 12 13 C 15 12 18 10 17 8 C 16 6 13 9 12 13"/>' +
          '<path d="M 12 13 C 11.5 10 11.5 8 12 5 C 12.5 8 12.5 10 12 13"/>' +
        '</svg>';

      var ICON_ANDROID =
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M4 13a8 8 0 0 1 8-8 8 8 0 0 1 8 8v7H4z"/>' +
          '<path d="M8 21v1M16 21v1M7 5.5 5 3M17 5.5l2-2.5"/>' +
          '<circle cx="9.5" cy="11" r="0.5" fill="currentColor"/>' +
          '<circle cx="14.5" cy="11" r="0.5" fill="currentColor"/>' +
        '</svg>';

      var ICON_APPLE =
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">' +
          '<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.53 3.99zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>' +
        '</svg>';

      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function row(label, value) {
        return (
          '<div class="row">' +
          '<span class="label">' + esc(label) + '</span>' +
          '<span class="value">' + esc(value) + '</span>' +
          '</div>'
        );
      }

      function showError(msg) {
        document.getElementById("root").innerHTML =
          '<div class="wrap">' +
            '<div class="brand">' +
              '<div class="app-icon">' + ICON_SPROUT_WHITE + '</div>' +
              '<div class="app-name">Fr\u00f8</div>' +
            '</div>' +
            '<div class="card" style="text-align:center;padding:36px 20px;">' +
              '<p style="color:#6b7280;font-size:15px;line-height:1.65;">' + esc(msg) + '</p>' +
            '</div>' +
          '</div>';
      }

      function render(share, shareId, claimCount) {
        var c = share.cultivar_snapshot;
        var l = share.lot_snapshot;
        var sharer = share.shared_by_display_name || "A Fr\u00f8 user";
        var netGen = share.network_generation || 1;
        var appLink = "fro://import?shareId=" + shareId;
        var avatarLetter = sharer.charAt(0).toUpperCase();

        document.title = c.varietyName + " \u2014 Fr\u00f8";

        var seedRows =
          (l.yearHarvested ? row("Harvested", l.yearHarvested) : "") +
          (l.generation ? row("Generation", "G" + l.generation) : "") +
          row("Network generation", "G" + netGen + " in Fr\u00f8") +
          (l.germinationRatePct != null
            ? row("Germination rate", l.germinationRatePct + "%")
            : "") +
          (l.quantitySeeds ? row("Seeds in packet", l.quantitySeeds) : "");

        var growRows =
          (c.lifecycle ? row("Type", c.lifecycle) : "") +
          (c.daysToMaturity ? row("Days to maturity", c.daysToMaturity) : "") +
          (c.seedViabilityYears
            ? row("Seed viability", c.seedViabilityYears + " years")
            : "");

        var notes = [l.notes, c.notes].filter(Boolean).join(" \u00b7 ");

        var noticeBanner = claimCount > 0
          ? '<div class="notice">' +
              ICON_SPROUT_GREEN +
              '<span>' + claimCount + ' ' +
              (claimCount === 1 ? 'person has' : 'people have') +
              ' already received these seeds.</span>' +
            '</div>'
          : '';

        document.getElementById("root").innerHTML =
          '<div class="wrap">' +

          '<div class="brand">' +
            '<div class="app-icon">' + ICON_SPROUT_WHITE + '</div>' +
            '<div class="app-name">Fr\u00f8</div>' +
            '<div class="app-tagline">Fra fr\u00f8 til fr\u00f8</div>' +
          '</div>' +

          '<div class="hero">' +
            (c.category ? '<div class="category-badge">' + esc(c.category) + '</div>' : '') +
            '<div class="variety-name">' + esc(c.varietyName) + '</div>' +
            '<div class="common-name">' +
              esc(c.commonName) +
              (c.species ? ' &middot; <em>' + esc(c.species) + '</em>' : '') +
            '</div>' +
          '</div>' +

          '<div class="sharer">' +
            '<div class="sharer-avatar">' + avatarLetter + '</div>' +
            '<div>' +
              '<div class="sharer-label">Shared by</div>' +
              '<div class="sharer-name">' + esc(sharer) + '</div>' +
            '</div>' +
          '</div>' +

          noticeBanner +

          (seedRows
            ? '<div class="card"><div class="card-title">About these seeds</div>' + seedRows + '</div>'
            : '') +

          (growRows
            ? '<div class="card"><div class="card-title">Growing info</div>' + growRows + '</div>'
            : '') +

          (notes
            ? '<div class="card"><div class="card-title">Notes</div><p class="notes">' + esc(notes) + '</p></div>'
            : '') +

          '<div class="actions">' +
            '<a href="' + appLink + '" class="cta">' +
              ICON_SPROUT_WHITE +
              'Add to my Fr\u00f8' +
            '</a>' +
            '<p class="hint">Already have Fr\u00f8? Tap above to import directly.<br>New here? Download the app to start tracking your seeds.</p>' +
            '<div class="store-buttons">' +
              '<a href="https://play.google.com/store/apps/details?id=com.orjanstoras.fro" class="store-btn">' +
                ICON_ANDROID + 'Google Play' +
              '</a>' +
              '<a href="https://apps.apple.com/app/fro/id0000000000" class="store-btn">' +
                ICON_APPLE + 'App Store' +
              '</a>' +
            '</div>' +
          '</div>' +

          '<div class="footer">' +
            ICON_SPROUT_GRAY +
            '<span>Fr\u00f8 &mdash; Fra fr\u00f8 til fr\u00f8</span>' +
          '</div>' +

          '</div>';
      }

      function load() {
        var shareId = window.location.pathname.replace(/^\//, "").split("/")[0];
        if (!shareId) {
          showError("Share link not found.");
          return;
        }

        var headers = {
          apikey: SUPABASE_ANON_KEY,
          Authorization: "Bearer " + SUPABASE_ANON_KEY,
        };

        fetch(
          SUPABASE_URL + "/rest/v1/seed_shares?id=eq." + shareId + "&select=*",
          { headers: headers }
        )
          .then(function(res) { return res.json(); })
          .then(function(rows) {
            if (!rows || rows.length === 0) {
              showError("This share link is invalid or has expired.");
              return;
            }
            var share = rows[0];

            fetch(
              SUPABASE_URL +
                "/rest/v1/seed_share_claims?share_id=eq." +
                shareId +
                "&select=id",
              { headers: Object.assign({}, headers, { Prefer: "count=exact" }) }
            )
              .then(function(cr) {
                var range = cr.headers.get("content-range") || "";
                var claimCount = parseInt(range.split("/")[1] || "0", 10) || 0;
                render(share, shareId, claimCount);
              })
              .catch(function() { render(share, shareId, 0); });
          })
          .catch(function() {
            showError("Could not load seed info. Please check your connection.");
          });
      }

      load();
    </script>
  </body>
</html>
